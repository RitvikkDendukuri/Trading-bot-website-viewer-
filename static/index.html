<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trading Bots — Live Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script>
    (function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t)})();
  </script>
</head>
<body>
  <div class="wrap">
    <div class="masthead">
      <header class="top">
        <h1>Trading<span class="dot">/</span>Bots</h1>
        <div class="top-right">
          <span class="ws-dot" id="ws-dot" title="WebSocket disconnected"></span>
          <span id="clock"></span>
          <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode"></button>
        </div>
      </header>
      <p class="subtitle">Live paper-trading desk — marked to market every minute, benchmarked against <b>SPY</b>.</p>
    </div>
    <div id="grid" class="grid"><div class="loading">Loading bots...</div></div>
  </div>
  <script src="/static/theme.js"></script>
  <script src="/static/ws-client.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
