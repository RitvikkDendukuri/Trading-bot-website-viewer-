<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bot — Live Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <script>
    (function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t)})();
  </script>
</head>
<body>
  <div class="wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <a class="back" href="/">&#8592; All bots</a>
      <div class="top-right">
        <span class="refresh-indicator" id="refresh-indicator"><span class="spinner" style="width:12px;height:12px;border-width:2px;margin-right:4px"></span>Syncing</span>
        <span class="ws-dot" id="ws-dot" title="WebSocket disconnected"></span>
        <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode"></button>
      </div>
    </div>
    <div class="detail-head">
      <h1 id="bot-name">Loading...</h1>
      <div class="detail-head-right">
        <span id="live-badge"></span>
        <div class="nav-links">
          <a href="#" id="trades-link">Trade Log</a>
          <a id="gh-link" href="#" target="_blank" rel="noopener">GitHub &#8599;</a>
        </div>
      </div>
    </div>

    <div class="statbar" id="statbar"></div>

    <div class="chart-wrap">
      <div class="chart-toolbar">
        <div class="ranges" id="ranges">
          <button data-range="1D">1D</button>
          <button data-range="1W">1W</button>
          <button data-range="1M">1M</button>
          <button data-range="6M">6M</button>
          <button data-range="YTD" class="active">YTD</button>
          <button data-range="1Y">1Y</button>
        </div>
        <button id="focus-toggle" class="focus-btn">&#9678; Focus: Bot</button>
      </div>
      <div class="legend">
        <span class="l-strat">Strategy</span>
        <span class="l-spy">SPY benchmark</span>
        <span class="muted">— dashed = live</span>
        <a href="#" id="reset-zoom" style="margin-left:auto">reset zoom</a>
      </div>
      <canvas id="chart"></canvas>
    </div>

    <div class="chart-wrap">
      <h2 style="margin:0 0 12px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:2px;border-bottom:2px solid var(--ink);padding-bottom:8px">Drawdown</h2>
      <div class="legend">
        <span class="l-strat">Strategy</span>
        <span class="l-spy">SPY benchmark</span>
      </div>
      <canvas id="dd-chart" style="max-height:220px"></canvas>
    </div>

    <div class="panel" id="day-detail-panel" style="display:none">
      <h2 id="day-detail-title">Trade Detail</h2>
      <div id="day-detail-content"></div>
    </div>

    <div class="panel">
      <h2>Current Positions</h2>
      <table id="positions"><tbody><tr><td class="muted">No live positions yet.</td></tr></tbody></table>
    </div>

    <div class="panel">
      <h2>Risk &amp; Benchmark Metrics</h2>
      <div class="statbar" id="metricbar"></div>
    </div>

    <div class="panel">
      <h2>Methodology</h2>
      <div class="methodology" id="methodology"></div>
    </div>
  </div>
  <script src="/static/theme.js"></script>
  <script src="/static/ws-client.js"></script>
  <script src="/static/bot.js"></script>
</body>
</html>
